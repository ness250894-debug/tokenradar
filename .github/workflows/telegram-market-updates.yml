# Daily Market Updates
# Posts quick updates to Telegram 5 times a day.

name: Telegram Market Updates

on:
  schedule:
    - cron: "17 8 * * *"  # 08:17 UTC
    - cron: "17 12 * * *" # 12:17 UTC
    - cron: "17 16 * * *" # 16:17 UTC
    - cron: "17 20 * * *" # 20:17 UTC
    - cron: "17 22 * * *" # 22:17 UTC
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  post-update:
    name: Post Update to Telegram
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post Market Update
        run: npx tsx scripts/post-market-updates.ts --start 50 --end 250
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Commit tracking logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted-today.json
          git diff --staged --quiet || git commit -m "chore: update social tracking logs [skip ci]"
          git push
        continue-on-error: true

