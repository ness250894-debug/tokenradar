# Weekly Reporting
# Sends Weekly metrics summaries to Telegram every Monday.

name: Weekly Report

on:
  schedule:
    - cron: "0 9 * * 1"  # 9 AM UTC every Monday
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send Report
        run: npx tsx scripts/send-report.ts --weekly
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
          INITIAL_CLAUDE_BALANCE: ${{ vars.INITIAL_CLAUDE_BALANCE }}
          INITIAL_X_BALANCE: ${{ vars.INITIAL_X_BALANCE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
