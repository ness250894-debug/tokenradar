# Consolidated Social Automation Workflow
# Unified heartbeat for all social interactions on TokenRadar
#
# Total: 12 runs/day across Telegram (12 posts) and X/Twitter (5 posts)
# Exclusive slots: Poll (14:30) and Movers (23:30) replace regular TG updates

name: Social Automations

on:
  schedule:
    # --- Mixed Runs (6x/day) — TG + X or exclusive content ---
    - cron: "30 11 * * *" # TG Market + X Interactive Poll (07:30 EDT)
    - cron: "30 14 * * *" # [EXCLUSIVE] TG Poll + X Market (10:30 EDT)
    - cron: "30 17 * * *" # TG Market + X Market (13:30 EDT)
    - cron: "30 20 * * *" # TG Market + X Market (16:30 EDT)
    - cron: "30 23 * * *" # [EXCLUSIVE] TG Top 5 Movers Card (19:30 EDT)
    - cron: "30 02 * * *" # TG Market + X Market (22:30 EDT)
    
    # --- TG Only Runs (6x/day) — Telegram market updates only ---
    - cron: "30 05 * * *" # TG Market (01:30 EDT)
    - cron: "30 08 * * *" # TG Market (04:30 EDT)
    - cron: "30 13 * * *" # TG Market (09:30 EDT)
    - cron: "30 16 * * *" # TG Market (12:30 EDT)
    - cron: "30 19 * * *" # TG Market (15:30 EDT)
    - cron: "30 22 * * *" # TG Market (18:30 EDT)
    - cron: "15 18 * * *" # [EXCLUSIVE] Daily Video Breakout (14:15 EDT)
    
  workflow_dispatch:

concurrency:
  group: git-push-social-automations
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  IS_X_MARKET_RUN: ${{ contains(fromJson('["30 14 * * *", "30 17 * * *", "30 20 * * *", "30 02 * * *"]'), github.event.schedule) || github.event_name == 'workflow_dispatch' }}
  IS_EXCLUSIVE_SLOT: ${{ github.event.schedule == '30 23 * * *' || github.event.schedule == '30 14 * * *' || github.event.schedule == '15 18 * * *' }}
  IS_VIDEO_RUN: ${{ github.event.schedule == '15 18 * * *' || github.event_name == 'workflow_dispatch' }}

jobs:
  post-social:
    name: Execute Network Routing
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ─── 1. Telegram Market Update (10x/day, skipped during Poll & Movers slots) ──
      - name: Telegram Periodic Update
        if: env.IS_EXCLUSIVE_SLOT != 'true'
        run: npx tsx scripts/post-market-updates.ts --platform telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      # ─── 2. X Interactive Poll (Runs 1x Day @ 11:30) ───────────
      - name: X Daily Interactive Poll
        if: github.event.schedule == '30 11 * * *' || github.event_name == 'workflow_dispatch'
        run: npx tsx scripts/post-interactive-daily.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      # ─── 3. Telegram Interactive Poll (Runs 1x Day @ 14:30) ────
      - name: Telegram Daily Interactive Poll
        if: github.event.schedule == '30 14 * * *' || github.event_name == 'workflow_dispatch'
        run: npx tsx scripts/post-daily-poll.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

      # ─── 4. X Market Update (4x/day @ 14:30, 17:30, 20:30, 02:30) ──────
      - name: X Periodic Update
        if: env.IS_X_MARKET_RUN == 'true'
        run: npx tsx scripts/post-market-updates.ts --platform x
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      # ─── 5. Telegram Top Movers Image (Runs 1x Day @ 23:30) ────
      # Note: Requires Next.js API build running locally or hits prod.
      # We configured it to hit Next_PUBLIC_SITE_URL so it grabs the prod endpoint.
      - name: Telegram Top Movers Card
        if: github.event.schedule == '30 23 * * *' || github.event_name == 'workflow_dispatch'
        run: npx tsx scripts/post-daily-movers.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      # ─── 6. Daily Video Breakout (Runs 1x Day @ 18:15) ─────────
      - name: Daily Video Breakout
        if: env.IS_VIDEO_RUN == 'true'
        run: npx tsx scripts/post-video-daily.ts --platform all
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      # ─── Data State Synchronization ────────────────────────────
      - name: Commit Tracking Logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: push unified social routing state [skip ci]"
          for i in 1 2 3; do
            git pull origin main -X ours --no-edit && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *Social Automation Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
