# Weekly Content Generation (Lightweight)
# Runs once a week to generate a small batch of AI content templates in the queue.
# Kept intentionally small (~18 articles) to avoid 4+ hour runtimes.

name: Weekly Content Generation

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: weekly-content-gen
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate Batch Content
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Sync top token data
        run: npx tsx scripts/fetch-crypto-data.ts --start 1 --end 250 --lite
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Compute metrics
        run: npx tsx scripts/compute-metrics.ts

      - name: Generate AI content into Queue
        # Generates up to 25 tracked tokens + 3 TGE tokens (~78 articles)
        run: npx tsx scripts/generate-content.ts --max 25 --max-tge 3 --queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Commit queued templates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "data/queue" ]; then
            git add data/queue
          fi
          if git diff --staged --quiet; then
            echo "No new templates to queue"
            exit 0
          fi
          git commit -m "chore: weekly batch content generation [skip ci]"
          for i in 1 2 3; do
            git pull origin main -X ours --no-edit && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_REPORT_BOT_TOKEN/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"$TELEGRAM_REPORT_CHAT_ID\", \"text\": \"❌ *Weekly Content Generation Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
