# Weekly Content Generation
# Runs every Monday at 08:00 UTC to generate new AI articles,
# run quality checks, and post to social media.

name: Weekly Content

on:
  schedule:
    - cron: "37 8 * * 1" # 08:37 UTC every Monday
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate & Publish Content
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate AI content (max 5 tokens)
        run: npx tsx scripts/generate-content.ts --max 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Quality check generated content
        run: npx tsx scripts/quality-check.ts --fix

      - name: Post to X (Twitter)
        run: npx tsx scripts/post-to-x.ts --max 5
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Post to Telegram
        run: npx tsx scripts/post-to-telegram.ts --max 5
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ data/
          git diff --staged --quiet || git commit -m "chore: weekly content generation [skip ci]"
          git push

  deploy:
    name: Redeploy Site
    needs: generate
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
