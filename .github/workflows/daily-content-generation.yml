# Daily Content Generation
# Runs three times a day to generate new AI articles,
# deploy the site, then post to social media.
# Order: generate → deploy → social (so URLs are live before sharing)

name: Daily Content Generation

on:
  schedule:
    - cron: "27 * * * *" # Run at minute 27 past every hour to avoid GitHub Actions congestion
  workflow_dispatch:

concurrency:
  group: git-push-content-gen
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  generate:
    name: Generate & Publish Content
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync top token data (Populate queue)
        run: npx tsx scripts/fetch-crypto-data.ts --start 1 --end 250 --lite
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Compute metrics (Update scores)
        run: npx tsx scripts/compute-metrics.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Discover upcoming TGEs
        run: npx tsx scripts/discover-tges.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Generate AI content
        run: npx tsx scripts/generate-content.ts --max 10 --max-tge 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Quality check generated content
        run: npx tsx scripts/quality-check.ts --fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      # Note: [skip ci] prevents the `on: push` trigger in deploy.yml.
      # The explicit `deploy` job below is the ONLY deploy trigger for this workflow.
      - name: Commit updated data & content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: automated daily content update [skip ci]" && git pull --rebase origin main && git push)

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *Content Generation Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"

  deploy:
    name: Redeploy Site
    needs: generate
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
    secrets: inherit

  notify:
    name: Send Generation Alert
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (latest, including generate job's commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dispatch Telegram Alert
        run: npx tsx scripts/send-deployment-alert.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}


