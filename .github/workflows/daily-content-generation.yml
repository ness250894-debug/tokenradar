# Daily Lightweight Publication
# Runs daily to pick templates from the queue, inject 
# live market data, and publish them to the live site.
# This workflow stays lightweight by publishing from the queue instead of regenerating the full site catalog.

name: Daily Content Generation

on:
  schedule:
    - cron: "0 6 * * *" # 1x/day (06:00 UTC)
  workflow_dispatch:

concurrency:
  group: git-push-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  publish:
    name: Inject Data & Publish
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Drip Content (Safe SEO pace)
        run: npx tsx scripts/generate-content.ts --drip --refresh-macro --queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Publish from Queue (Incorporate live data)
        run: npx tsx scripts/publish-from-queue.ts --max 15
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Inject Semantic Internal Links
        run: npx tsx scripts/inject-internal-links.ts

      - name: Commit published articles
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for dir in content/tokens data/queue data/tokens; do
            if [ -d "$dir" ]; then
              git add "$dir"
            fi
          done
          if git diff --staged --quiet; then
            echo "No new articles published from queue"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          git commit -m "chore: publish articles from queue [skip ci]"
          for i in 1 2 3; do
            git pull origin main -X ours --no-edit && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_REPORT_BOT_TOKEN/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"$TELEGRAM_REPORT_CHAT_ID\", \"text\": \"❌ *Daily Publication Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

  deploy:
    name: Redeploy Site
    needs: publish
    if: needs.publish.outputs.has_changes == 'true'
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
    secrets: inherit
