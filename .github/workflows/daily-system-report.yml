name: Daily System Report

on:
  schedule:
    - cron: "55 23 * * *" # Run at 23:55 every day
  workflow_dispatch:

concurrency:
  group: git-push-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  notify:
    name: Send Daily System Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Dispatch System Report & Cleanup
        run: npx tsx scripts/send-system-report.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Commit cleaned logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: cleanup system logs after report dispatch [skip ci]"
          for i in 1 2 3; do
            git pull origin main -X ours --no-edit && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
