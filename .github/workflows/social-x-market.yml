# X Market Updates
# Posts quick updates to X 5 times a day.

name: X Market Updates

on:
  schedule:
    - cron: "27 8 * * *"  # 08:27 UTC (Slightly offset from TG)
    - cron: "27 12 * * *" # 12:27 UTC
    - cron: "27 16 * * *" # 16:27 UTC
    - cron: "27 20 * * *" # 20:27 UTC
    - cron: "27 22 * * *" # 22:27 UTC
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  post-x:
    name: Post Update to X
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post X Update
        run: npx tsx scripts/post-market-updates.ts --start 50 --end 250 --platform x
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Commit tracking logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted-today.json
          git diff --staged --quiet || git commit -m "chore: update X tracking logs [skip ci]"
          git push
        continue-on-error: true
