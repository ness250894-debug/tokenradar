# Deploy to Cloudflare Pages
# Triggers on push to main branch and manual dispatch.
# Builds the Next.js static export and deploys via Wrangler.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        type: string
        default: 'main'

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Run Typecheck
        run: npx tsc --noEmit

      - name: Run Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.SITE_NAME || 'TokenRadar' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Error: 'out' directory not found. Build likely failed."
            exit 1
          fi
          
          FILE_COUNT=$(find out -type f | wc -l)
          echo "📊 Total files in out/: $FILE_COUNT"
          echo "✅ Static export verified ($FILE_COUNT files)."

      - name: Deploy to Cloudflare Pages
        run: |
          # Pure static file upload — no worker, no KV, no D1.
          npx wrangler pages deploy out/ \
            --project-name=tokenradar \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ping IndexNow
        run: npx tsx scripts/ping-indexnow.ts
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_REPORT_BOT_TOKEN/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"$TELEGRAM_REPORT_CHAT_ID\", \"text\": \"❌ *Deploy Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
