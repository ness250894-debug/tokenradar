# Deploy to Cloudflare Pages
# Triggers on push to main branch and manual dispatch.
# Builds the Next.js static export and deploys via Wrangler.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        type: string
        default: 'main'

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Run Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build for Cloudflare (OpenNext)
        run: npm run build:cf
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.SITE_NAME || 'TokenRadar' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Verify build output
        run: |
          if [ ! -d ".open-next" ]; then
            echo "❌ Error: '.open-next' directory not found. Build likely failed."
            exit 1
          fi
          
          # Count total files in the deployment bundle
          FILE_COUNT=$(find .open-next -type f | wc -l)
          echo "📊 Total files in .open-next: $FILE_COUNT"
          
          # Breakdown by top-level directory
          echo "📂 File count breakdown:"
          for dir in .open-next/*/; do
            DIR_COUNT=$(find "$dir" -type f | wc -l)
            echo "  $(basename "$dir"): $DIR_COUNT files"
          done
          
          # Cloudflare Pages limit is 20,000 files. Fail at 15,000 for safety.
          if [ "$FILE_COUNT" -gt 15000 ]; then
            echo "❌ Error: .open-next contains $FILE_COUNT files (limit: 15,000 for safety, CF max: 20,000)."
            echo "   Check if consolidate-data.ts is copying unnecessary individual files to public/."
            exit 1
          fi
          
          echo "✅ Build output verified ($FILE_COUNT files, under 15,000 limit)."

      - name: Deploy to Cloudflare Pages
        run: |
          # Explicitly set branch to main and force deployment
          npx wrangler pages deploy .open-next \
            --project-name=tokenradar \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge Workers KV Cache (Resilient)
        run: |
          echo "Purging NEXT_CACHE_WORKERS_KV cache via Direct API..."
          NAMESPACE_ID="fbe7ef84e190427b9c17292bf7e39ce0"
          
          # We use '|| true' to ensure this step NEVER fails the build
          (
            RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/$NAMESPACE_ID/keys" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json")
            
            SUCCESS=$(echo $RESPONSE | jq -r '.success')
            
            if [ "$SUCCESS" = "true" ]; then
              KEYS=$(echo $RESPONSE | jq -c '.result | map(.name)')
              COUNT=$(echo $RESPONSE | jq '.result | length')
              
              if [ "$COUNT" -gt 0 ]; then
                echo "Found $COUNT keys. Deleting..."
                curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/$NAMESPACE_ID/bulk" \
                  -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                  -H "Content-Type: application/json" \
                  -d "$KEYS" > /dev/null
                echo "✅ Cache purge request sent."
              else
                echo "✅ Cache is already empty."
              fi
            else
              echo "⚠️ Cache fetch failed, skipping purge: $(echo $RESPONSE | jq -c '.errors')"
            fi
          ) || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ping IndexNow
        run: npx tsx scripts/ping-indexnow.ts
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *Deploy Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
