# Deploy to Cloudflare Pages
# Triggers on push to main branch and manual dispatch.
# Builds the Next.js static export and deploys via Wrangler.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      ref:
        description: 'Commit SHA, branch or tag to deploy'
        required: false
        type: string
        default: 'main'

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.SITE_NAME || 'TokenRadar' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Verify static export
        run: |
          if [ ! -d "out" ]; then
            echo "❌ Error: 'out' directory not found. Build likely failed to export."
            exit 1
          fi
          echo "✅ 'out' directory found. Proceeding to deploy."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=tokenradar --branch=${{ github.head_ref || github.ref_name }} --verbose

      - name: Ping IndexNow
        run: npx tsx scripts/ping-indexnow.ts
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *Deploy Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
