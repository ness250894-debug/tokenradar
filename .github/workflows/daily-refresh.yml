# Daily Data Refresh
# Runs every day at 06:00 UTC to fetch fresh token data,
# recompute metrics, and redeploy the site.

name: Daily Refresh

on:
  schedule:
    - cron: "23 6 * * *" # 06:23 UTC daily
  workflow_dispatch:

concurrency:
  group: git-push-daily-refresh
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  refresh:
    name: Fetch Data & Refresh
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch token data from CoinGecko
        run: npx tsx scripts/fetch-crypto-data.ts --start 1 --end 250 --lite
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Discover upcoming TGEs
        run: npx tsx scripts/discover-tges.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Fetch reference articles
        run: npx tsx scripts/fetch-reference-articles.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Compute metrics
        run: npx tsx scripts/compute-metrics.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      # Note: [skip ci] prevents the `on: push` trigger in deploy.yml.
      # The explicit `deploy` job below is the ONLY deploy trigger for this workflow.
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: daily data refresh [skip ci]" && git pull --rebase origin main && git push)

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *Daily Refresh Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"

  deploy:
    name: Redeploy Site
    needs: refresh
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
    secrets: inherit
