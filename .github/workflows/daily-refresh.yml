# Daily Data Refresh
# Runs every day at 06:00 UTC to fetch fresh token data,
# recompute metrics, and redeploy the site.

name: Daily Refresh

on:
  schedule:
    - cron: "23 6 * * *" # 06:23 UTC daily
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  refresh:
    name: Fetch Data & Refresh
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch token data from CoinGecko
        run: npx tsx scripts/fetch-crypto-data.ts --start 1 --end 100
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Fetch reference articles
        run: npx tsx scripts/fetch-reference-articles.ts

      - name: Compute metrics
        run: npx tsx scripts/compute-metrics.ts

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily data refresh [skip ci]"
          git push

  deploy:
    name: Redeploy Site
    needs: refresh
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
