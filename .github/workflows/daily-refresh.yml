# Daily Data Refresh
# Runs every day at 17:45 UTC to fetch fresh token data,
# recompute metrics, and redeploy the site.

name: Daily Refresh

on:
  schedule:
    - cron: "45 17 * * *" # 17:45 UTC daily
  workflow_dispatch:

concurrency:
  group: git-push-main
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  refresh:
    name: Fetch Data & Refresh
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache data/cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: ${{ runner.os }}-coingecko-data-refresh-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-coingecko-data-refresh-
            ${{ runner.os }}-coingecko-data-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Fetch token data from CoinGecko
        run: npx tsx scripts/fetch-crypto-data.ts --start 1 --end 500 --lite
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Discover upcoming TGEs
        run: npx tsx scripts/discover-tges.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}


      - name: Fetch reference articles
        run: npx tsx scripts/fetch-reference-articles.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Compute metrics
        run: npx tsx scripts/compute-metrics.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Regenerate OG images
        run: npx tsx scripts/generate-og-images.tsx --force
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      # Note: [skip ci] prevents the `on: push` trigger in deploy.yml.
      # The explicit `deploy` job below is the ONLY deploy trigger for this workflow.
      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          git commit -m "chore: daily data refresh [skip ci]"
          pushed=false
          for i in 1 2 3; do
            if git pull origin main -X ours --no-edit && git push; then
              pushed=true
              break
            fi
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          if [ "$pushed" != "true" ]; then
            echo "Failed to push daily refresh changes after 3 attempts"
            exit 1
          fi

      - name: Dispatch System Report & Cleanup
        if: always()
        run: npx tsx scripts/send-system-report.ts
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_REPORT_BOT_TOKEN/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"$TELEGRAM_REPORT_CHAT_ID\", \"text\": \"❌ *Daily Refresh Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
        env:
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}

  deploy:
    name: Redeploy Site
    needs: refresh
    if: needs.refresh.outputs.has_changes == 'true'
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
    secrets: inherit
