# Telegram Market Updates
# Posts quick updates to Telegram every 2 hours (24/7).

name: Telegram Market Updates

on:
  schedule:
    - cron: "17 */2 * * *"  # Every 2 hours at :17 (12 times a day)
  workflow_dispatch:

concurrency:
  group: git-push-tg-market
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  post-tg:
    name: Post Update to Telegram
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post Telegram Update
        run: npx tsx scripts/post-market-updates.ts --start 50 --end 250 --platform telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_REPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}
          TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://tokenradar.co' }}

      - name: Commit tracking logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: update telegram tracking logs [skip ci]" && git pull --rebase origin main && git push)

      - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_REPORT_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_REPORT_CHAT_ID }}\", \"text\": \"❌ *TG Market Update Failed*\\nWorkflow: ${{ github.workflow }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"parse_mode\": \"Markdown\"}"
